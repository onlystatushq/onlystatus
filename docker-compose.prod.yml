# Production overlay - use with: docker compose -f docker-compose.yaml -f docker-compose.prod.yml up -d
#
# Adds resource limits, logging rotation, and production NODE_ENV.
# For reverse proxy and TLS setup, see docs/DEPLOYMENT.md.

services:
    workflows:
        deploy:
            resources:
                limits:
                    memory: 512M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    server:
        deploy:
            resources:
                limits:
                    memory: 512M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    checker:
        deploy:
            resources:
                limits:
                    memory: 256M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    dashboard:
        deploy:
            resources:
                limits:
                    memory: 1G
        environment:
            - NODE_ENV=production
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    status-page:
        deploy:
            resources:
                limits:
                    memory: 512M
        environment:
            - NODE_ENV=production
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    libsql:
        deploy:
            resources:
                limits:
                    memory: 512M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    tinybird-local:
        deploy:
            resources:
                limits:
                    memory: 1G
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    private-location:
        deploy:
            resources:
                limits:
                    memory: 256M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
