# Production overlay - use with: docker compose -f docker-compose.yaml -f docker-compose.prod.yml up -d
#
# Adds resource limits, logging rotation, and production NODE_ENV.
# For reverse proxy and TLS setup, see docs/DEPLOYMENT.md.

services:
    workflows:
        mem_limit: 512M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    server:
        mem_limit: 512M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    checker:
        mem_limit: 256M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    dashboard:
        mem_limit: 1G
        environment:
            - NODE_ENV=production
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    status-page:
        mem_limit: 512M
        environment:
            - NODE_ENV=production
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    libsql:
        mem_limit: 512M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    tinybird-local:
        mem_limit: 2G
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    private-location:
        mem_limit: 256M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
