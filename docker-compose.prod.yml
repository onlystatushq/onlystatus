# Production overlay - use with: docker compose -f docker-compose.yaml -f docker-compose.prod.yml up -d
services:
    workflows:
        deploy:
            resources:
                limits:
                    memory: 512M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    server:
        deploy:
            resources:
                limits:
                    memory: 512M
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    checker:
        deploy:
            resources:
                limits:
                    memory: 256M

    dashboard:
        deploy:
            resources:
                limits:
                    memory: 1G
        environment:
            - NODE_ENV=production

    status-page:
        deploy:
            resources:
                limits:
                    memory: 512M
        environment:
            - NODE_ENV=production

    libsql:
        deploy:
            resources:
                limits:
                    memory: 512M

    tinybird-local:
        deploy:
            resources:
                limits:
                    memory: 1G
