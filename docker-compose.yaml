networks:
    onlystatus:
        driver: bridge
        name: onlystatus

volumes:
    libsql-data:
        name: onlystatus-libsql-data
    tinybird-data:
        name: onlystatus-tinybird-data
    tinybird-auth:
        name: onlystatus-tinybird-auth
    uploads:
        name: onlystatus-uploads

services:
    # External services
    libsql:
        container_name: onlystatus-libsql
        image: ghcr.io/tursodatabase/libsql-server:v0.24.33
        networks:
            - onlystatus
        ports:
            - "${LIBSQL_HTTP_PORT:-8080}:8080"
            - "${LIBSQL_GRPC_PORT:-5001}:5001"
        volumes:
            - libsql-data:/var/lib/sqld
        environment:
            - SQLD_NODE=primary
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'perl -e ''use IO::Socket::INET; exit(IO::Socket::INET->new(PeerAddr=>"127.0.0.1:8080",Timeout=>1) ? 0 : 1);''',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        restart: unless-stopped

    tinybird-local:
        container_name: onlystatus-tinybird
        image: tinybirdco/tinybird-local:latest  # pinned by platform; no version tags available
        platform: linux/amd64
        networks:
            - onlystatus
        ports:
            - "${TINYBIRD_PORT:-7181}:7181"
        volumes:
            - tinybird-data:/var/lib/tinybird
            - tinybird-auth:/auth
        environment:
            - COMPATIBILITY_MODE=1
        entrypoint: ["/bin/bash", "-c"]
        command:
            - |
                (while [ ! -f /app/.tinyb ]; do sleep 1; done; cp /app/.tinyb /auth/.tinyb) &
                exec /usr/bin/supervisord
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:7181/"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 20s
        restart: unless-stopped

    tinybird-deploy:
        container_name: onlystatus-tinybird-deploy
        image: tinybirdco/tinybird-cli-docker:latest  # no version tags available
        platform: linux/amd64
        networks:
            - onlystatus
        volumes:
            - tinybird-auth:/auth:ro
            - ./packages/tinybird:/mnt/data:ro
            - ./scripts:/scripts:ro
        environment:
            - TINYBIRD_HOST=http://tinybird-local:7181
            - AUTH_FILE=/auth/.tinyb
        depends_on:
            tinybird-local:
                condition: service_healthy
        entrypoint: ["sh", "/scripts/tinybird-deploy.sh"]
        restart: "no"

    db-migrate:
        container_name: onlystatus-db-migrate
        build:
            context: .
            dockerfile: apps/workflows/Dockerfile
            target: migrate
        networks:
            - onlystatus
        working_dir: /app/packages/db
        entrypoint: ["/bin/sh", "-c", "bun x drizzle-kit push --force"]
        environment:
            - DATABASE_URL=http://libsql:8080
            - DATABASE_AUTH_TOKEN=dummy
            - CLICKHOUSE_URL=
            - CLICKHOUSE_USERNAME=
            - CLICKHOUSE_PASSWORD=
        depends_on:
            libsql:
                condition: service_healthy
        restart: "no"

    # Internal Services
    workflows:
        container_name: onlystatus-workflows
        build:
            context: .
            dockerfile: apps/workflows/Dockerfile
        networks:
            - onlystatus
        volumes:
            - ./data:/app/data
        env_file:
            - .env.docker
        environment:
            - DATABASE_URL=http://libsql:8080
            - PORT=3000
        depends_on:
            libsql:
                condition: service_healthy
            db-migrate:
                condition: service_completed_successfully
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'perl -e ''use IO::Socket::INET; exit(IO::Socket::INET->new(PeerAddr=>"127.0.0.1:3000",Timeout=>1) ? 0 : 1);''',
                ]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 30s
        restart: unless-stopped

    server:
        container_name: onlystatus-server
        build:
            context: .
            dockerfile: apps/server/Dockerfile
        networks:
            - onlystatus
        ports:
            - "${SERVER_PORT:-3001}:3000"
        env_file:
            - .env.docker
        environment:
            - DATABASE_URL=http://libsql:8080
            - CHECKER_URL=http://checker:8080
            - PORT=3000
        depends_on:
            workflows:
                condition: service_healthy
            libsql:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:3000/ping || exit 1"]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 30s
        restart: unless-stopped

    checker:
        container_name: onlystatus-checker
        build:
            context: apps/checker
            dockerfile: Dockerfile
        networks:
            - onlystatus
        ports:
            - "${CHECKER_PORT:-8082}:8080"
        env_file:
            - .env.docker
        volumes:
            - tinybird-auth:/auth:ro
        environment:
            - CLOUD_PROVIDER=docker
            - REGION=local
            - PORT=8080
            - TINYBIRD_URL=http://tinybird-local:7181
            - TINYBIRD_AUTH_FILE=/auth/.tinyb
            - WORKFLOWS_URL=http://workflows:3000
            - GIN_MODE=release
        depends_on:
            tinybird-deploy:
                condition: service_completed_successfully
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 15s
        restart: unless-stopped

    private-location:
        container_name: onlystatus-private-location
        build:
            context: apps/private-location
            dockerfile: Dockerfile
        networks:
            - onlystatus
        ports:
            - "${PRIVATE_LOCATION_PORT:-8081}:8080"
        env_file:
            - .env.docker
        volumes:
            - tinybird-auth:/auth:ro
        environment:
            - DB_URL=http://libsql:8080
            - TINYBIRD_URL=http://tinybird-local:7181
            - TINYBIRD_AUTH_FILE=/auth/.tinyb
            - GIN_MODE=release
            - PORT=8080
        depends_on:
            server:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 30s
        restart: unless-stopped

    cron:
        container_name: onlystatus-cron
        image: alpine:3.21
        networks:
            - onlystatus
        env_file:
            - .env.docker
        entrypoint: /bin/sh
        command:
            - -c
            - |
                apk add --no-cache curl > /dev/null 2>&1
                CRON_URL="http://workflows:3000/cron/checker"
                AUTH="$$CRON_SECRET"
                echo "* * * * * curl -sf -H 'authorization: '$$AUTH $$CRON_URL/1m" > /etc/crontabs/root
                echo "*/5 * * * * curl -sf -H 'authorization: '$$AUTH $$CRON_URL/5m" >> /etc/crontabs/root
                echo "*/10 * * * * curl -sf -H 'authorization: '$$AUTH $$CRON_URL/10m" >> /etc/crontabs/root
                echo "*/30 * * * * curl -sf -H 'authorization: '$$AUTH $$CRON_URL/30m" >> /etc/crontabs/root
                echo "0 * * * * curl -sf -H 'authorization: '$$AUTH $$CRON_URL/1h" >> /etc/crontabs/root
                crond -f -l 6
        depends_on:
            workflows:
                condition: service_healthy
        restart: unless-stopped

    dashboard:
        container_name: onlystatus-dashboard
        build:
            context: .
            dockerfile: apps/dashboard/Dockerfile
        networks:
            - onlystatus
        ports:
            - "${DASHBOARD_PORT:-3002}:3000"
        env_file:
            - .env.docker
        volumes:
            - tinybird-auth:/auth:ro
            - uploads:/app/uploads
        environment:
            - DATABASE_URL=http://libsql:8080
            - TINYBIRD_URL=http://tinybird-local:7181
            - TINYBIRD_AUTH_FILE=/auth/.tinyb
            - PORT=3000
            - HOSTNAME=0.0.0.0
            - AUTH_TRUST_HOST=true
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                export TINY_BIRD_API_KEY=$$(node -e 'try{process.stdout.write(JSON.parse(require("fs").readFileSync("/auth/.tinyb","utf-8")).token)}catch(e){}' 2>/dev/null)
                exec node server.js
        depends_on:
            workflows:
                condition: service_healthy
            libsql:
                condition: service_healthy
            server:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 45s
        restart: unless-stopped

    status-page:
        container_name: onlystatus-status-page
        build:
            context: .
            dockerfile: apps/status-page/Dockerfile
        networks:
            - onlystatus
        ports:
            - "${STATUS_PAGE_PORT:-3003}:3000"
        env_file:
            - .env.docker
        volumes:
            - tinybird-auth:/auth:ro
        environment:
            - DATABASE_URL=http://libsql:8080
            - TINYBIRD_URL=http://tinybird-local:7181
            - TINYBIRD_AUTH_FILE=/auth/.tinyb
            - PORT=3000
            - HOSTNAME=0.0.0.0
            - AUTH_TRUST_HOST=true
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                export TINY_BIRD_API_KEY=$$(node -e 'try{process.stdout.write(JSON.parse(require("fs").readFileSync("/auth/.tinyb","utf-8")).token)}catch(e){}' 2>/dev/null)
                exec node server.js
        depends_on:
            workflows:
                condition: service_healthy
            libsql:
                condition: service_healthy
            server:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 45s
        restart: unless-stopped
